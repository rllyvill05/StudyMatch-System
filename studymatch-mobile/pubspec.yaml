name: studymatch
description: A peer-to-peer educational platform connecting students for collaborative learning.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  url_launcher: ^6.2.0
  flutter_card_swiper: ^7.0.1
  timeago: ^3.6.1
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  http: ^1.2.1
  tutorial_coach_mark: ^1.3.3 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    # - assets/images/